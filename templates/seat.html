<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生座位排列系統 | AVITA</title>
    
    <!-- 引入字體與全域樣式 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='seat.css') }}">
    
    <!-- 引入 html2canvas 用於高畫質截圖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="tool-panel wide">
        
        <!-- 頂部導覽列 -->
        <div class="panel-header">
            <a href="/" class="btn btn-back">◀ 返回大廳</a>
            <h2>🎓 學生座位排列系統</h2>
            <div class="header-spacer"></div>
        </div>

        <!-- 左右佈局 -->
        <div class="tool-layout">
            
            <!-- 引入左側控制面板 -->
            {% include 'components/seat/_sidebar.html' %}

            <!-- 引入右側主畫面 -->
            {% include 'components/seat/_content.html' %}

        </div>
    </div>

    <!-- 引入彈出視窗 (Modals) -->
    {% include 'components/seat/_modals.html' %}

    <!-- 引入前端互動邏輯 -->
    {% include 'components/seat/_scripts.html' %}

</body>
</html>
