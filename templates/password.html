{% extends "base.html" %}

{% block content %}
    <h1>隨機密碼產生器</h1>
    <p>需要一組安全的密碼嗎？讓 Python 幫你生一組 8 碼的英數密碼。</p>
    
    <button onclick="fetchData('/api/get_password')">產生密碼</button>
    <div id="display-result" class="result-box"></div>

    <script>
        function fetchData(apiUrl) {
            document.getElementById("display-result").innerText = "產生中...";
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("display-result").innerText = data.result;
                });
        }
    </script>
{% endblock %}
