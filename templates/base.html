<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的 Python 工具箱</title>
    <style>
        /* 簡單的 CSS 讓畫面看起來像個專業的 UI */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f4f9; }
        .navbar { background-color: #2c3e50; overflow: hidden; display: flex; justify-content: center; }
        .navbar a { color: white; text-align: center; padding: 15px 20px; text-decoration: none; font-size: 18px; transition: 0.3s; }
        .navbar a:hover { background-color: #1abc9c; }
        .content { max-width: 600px; margin: 40px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; margin-top: 15px; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 20px; font-size: 22px; font-weight: bold; color: #e74c3c; min-height: 30px;}
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <div class="navbar">
        <a href="/">🏠 首頁</a>
        <a href="/fortune">🥠 抽籤機</a>
        <a href="/password">🔐 密碼產生器</a>
    </div>

    <!-- 這裡是一個「挖空」的區域，讓各個子頁面填入專屬內容 -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
