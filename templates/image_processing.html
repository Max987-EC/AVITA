<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜合影像處理 | AVITA</title>
    
    <!-- =========================================
         🔤 字體與外部樣式表引入
         ========================================= -->
    <!-- 引入 Google 字體：Orbitron (科技感標題) 與 Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- 引入統一的外部樣式表 (已將所有 CSS 集中於此) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- 返回大廳按鈕 -->
    <div class="back-nav"><a href="/" class="btn">◀ 返回大廳</a></div>

    <div class="tool-panel">
        <h2>🎨 綜合影像處理</h2>
        
        <!-- =========================================
             📝 表單區塊：圖片上傳與演算法選擇
             ========================================= -->
        <form id="processForm">
            <!-- 1. 圖片上傳 -->
            <div class="form-group">
                <label for="imageInput">01 // 選擇目標影像 (IMAGE INPUT)</label>
                <input type="file" id="imageInput" name="image" accept="image/*" required>
            </div>
            
            <!-- 2. 演算法模組選擇 -->
            <div class="form-group">
                <label for="processType">02 // 選擇處理模組 (PROCESSING MODULE)</label>
                <select id="processType" name="process_type">
                    <optgroup label="[ 基本強度轉換 ]">
                        <option value="negative">負轉換 (Negative)</option>
                        <option value="binarize">二值化 (Binarization)</option>
                        <option value="log">對數轉換 (Log Transform)</option>
                        <option value="power_law">指數轉換 (Power-Law / Gamma)</option>
                        <option value="equalization">直方圖等化 (Histogram Equalization)</option>
                        <option value="clahe">限制對比自適應直方圖 (CLAHE)</option>
                    </optgroup>
                    <optgroup label="[ 空間域濾波 ]">
                        <option value="mean">均值濾波 (Mean Filter)</option>
                        <option value="gaussian">高斯濾波 (Gaussian Filter)</option>
                        <option value="median">中值濾波 (Median Filter)</option>
                    </optgroup>
                    <optgroup label="[ 邊緣偵測 ]">
                        <option value="roberts">Roberts 算子</option>
                        <option value="prewitt">Prewitt 算子</option>
                        <option value="sobel">Sobel 算子</option>
                        <option value="laplacian">Laplacian 算子</option>
                        <option value="log_edge">LoG (高斯拉普拉斯)</option>
                        <option value="canny">Canny 邊緣偵測</option>
                    </optgroup>
                    <optgroup label="[ 頻率域濾波 ]">
                        <option value="freq_ideal_low">理想低通濾波 (Ideal Lowpass)</option>
                        <option value="freq_butterworth_low">巴特沃斯低通濾波 (Butterworth Lowpass)</option>
                        <option value="freq_gaussian_low">高斯低通濾波 (Gaussian Lowpass)</option>
                        <option value="freq_ideal_high">理想高通濾波 (Ideal Highpass)</option>
                        <option value="freq_butterworth_high">巴特沃斯高通濾波 (Butterworth Highpass)</option>
                        <option value="freq_gaussian_high">高斯高通濾波 (Gaussian Highpass)</option>
                    </optgroup>
                </select>
            </div>

            <!-- =========================================
                 🎛️ 動態參數設定面板
                 透過 data-types 屬性綁定需要顯示此參數的演算法
                 ========================================= -->
            <div class="param-panel" id="paramPanel">
                <h4>[ 參數設定 PARAMETERS ]</h4>
                
                <!-- 二值化門檻 -->
                <div class="param-group" data-types="binarize">
                    <label>門檻值 (Threshold): <span id="val_threshold">127</span></label>
                    <input type="range" name="threshold" min="0" max="255" value="127" oninput="document.getElementById('val_threshold').innerText=this.value">
                </div>

                <!-- 對數/指數常數 -->
                <div class="param-group" data-types="log,power_law">
                    <label>常數 C (Constant): <span id="val_c">1.0</span></label>
                    <input type="range" name="c" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_c').innerText=this.value">
                </div>

                <!-- Gamma 值 -->
                <div class="param-group" data-types="power_law">
                    <label>Gamma (γ): <span id="val_gamma">1.0</span></label>
                    <input type="range" name="gamma" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_gamma').innerText=this.value">
                </div>

                <!-- CLAHE 參數 -->
                <div class="param-group" data-types="clahe">
                    <label>對比限制 (Clip Limit): <span id="val_clip">2.0</span></label>
                    <input type="range" name="clip_limit" min="1.0" max="10.0" step="0.1" value="2.0" oninput="document.getElementById('val_clip').innerText=this.value">
                </div>
                <div class="param-group" data-types="clahe">
                    <label>網格大小 (Tile Grid Size): <span id="val_tile">8</span></label>
                    <input type="range" name="tile_grid_size" min="2" max="16" step="2" value="8" oninput="document.getElementById('val_tile').innerText=this.value">
                </div>

                <!-- 卷積核與標準差 (空間濾波/邊緣偵測) -->
                <div class="param-group" data-types="mean,gaussian,median,log_edge">
                    <label>卷積核大小 (Kernel Size): <span id="val_kernel">3</span></label>
                    <input type="range" name="kernel_size" min="3" max="15" step="2" value="3" oninput="document.getElementById('val_kernel').innerText=this.value">
                </div>
                <div class="param-group" data-types="gaussian,log_edge">
                    <label>標準差 (Sigma): <span id="val_sigma">1.0</span></label>
                    <input type="range" name="sigma" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_sigma').innerText=this.value">
                </div>

                <!-- Canny 邊緣偵測雙門檻 -->
                <div class="param-group" data-types="canny">
                    <label>低門檻值 (Threshold 1): <span id="val_th1">50</span></label>
                    <input type="range" name="threshold1" min="0" max="255" value="50" oninput="document.getElementById('val_th1').innerText=this.value">
                </div>
                <div class="param-group" data-types="canny">
                    <label>高門檻值 (Threshold 2): <span id="val_th2">150</span></label>
                    <input type="range" name="threshold2" min="0" max="255" value="150" oninput="document.getElementById('val_th2').innerText=this.value">
                </div>

                <!-- 頻率域濾波參數 -->
                <div class="param-group" data-types="freq_ideal_low,freq_ideal_high,freq_butterworth_low,freq_gaussian_low,freq_butterworth_high,freq_gaussian_high">
                    <label>截斷頻率 (D0): <span id="val_d0">30</span></label>
                    <input type="range" name="D0" min="5" max="200" step="5" value="30" oninput="document.getElementById('val_d0').innerText=this.value">
                </div>
                <div class="param-group" data-types="freq_butterworth_low,freq_butterworth_high">
                    <label>階數 (n): <span id="val_n">2</span></label>
                    <input type="range" name="n" min="1" max="5" step="1" value="2" oninput="document.getElementById('val_n').innerText=this.value">
                </div>
            </div>
            
            <!-- 提交按鈕 -->
            <button type="submit" id="submitBtn" class="btn submit-btn">啟動處理程序 (EXECUTE)</button>
        </form>

        <!-- 處理中動畫 -->
        <div class="loading" id="loadingIndicator">[ PROCESSING DATA... ]</div>

        <!-- =========================================
             🖼️ 視覺化結果展示區塊 (預設隱藏)
             ========================================= -->
             
        <!-- 1. 空間域影像對比 -->
        <div class="comparison-grid" id="imageGrid">
            <div class="image-box">
                <h4>[ SPATIAL: ORIGINAL ]</h4>
                <img id="originalImage" src="" alt="原圖預覽">
            </div>
            <div class="image-box">
                <h4>[ SPATIAL: PROCESSED ]</h4>
                <img id="processedImage" src="" alt="處理結果">
            </div>
        </div>

        <!-- 2. 頻率域頻譜對比 -->
        <div class="histogram-section" id="spectrumSection">
            <h3 style="color: #b366ff; text-align: center; font-family: 'Orbitron'; margin-top: 0;">// FREQUENCY SPECTRUM //</h3>
            <div class="comparison-grid" style="display: grid; margin-top: 10px;">
                <div class="image-box" style="border-color: rgba(179, 102, 255, 0.3);">
                    <h4 style="color: #b366ff;">[ SPECTRUM: ORIGINAL ]</h4>
                    <img id="originalSpectrum" src="" alt="原圖頻譜">
                </div>
                <div class="image-box" style="border-color: rgba(179, 102, 255, 0.3);">
                    <h4 style="color: #b366ff;">[ SPECTRUM: PROCESSED ]</h4>
                    <img id="processedSpectrum" src="" alt="處理後頻譜">
                </div>
            </div>
        </div>

        <!-- 3. 強度直方圖對比 -->
        <div class="histogram-section" id="histogramSection">
            <h3 style="color: #ff0055; text-align: center; font-family: 'Orbitron'; margin-top: 0;">// INTENSITY HISTOGRAM //</h3>
            <div class="comparison-grid" style="display: grid; margin-top: 10px;">
                <div class="image-box" style="border-color: rgba(255, 0, 85, 0.3);">
                    <h4 style="color: #ff0055;">[ HISTOGRAM: ORIGINAL ]</h4>
                    <img id="originalHistogram" src="" alt="原圖直方圖">
                </div>
                <div class="image-box" style="border-color: rgba(255, 0, 85, 0.3);">
                    <h4 style="color: #ff0055;">[ HISTOGRAM: PROCESSED ]</h4>
                    <img id="processedHistogram" src="" alt="處理後直方圖">
                </div>
            </div>
        </div>
    </div>

    <!-- =========================================
         ⚙️ 前端互動邏輯 (JavaScript)
         ========================================= -->
    <script>
        // -----------------------------------------
        // 1. 動態參數面板控制邏輯
        // -----------------------------------------
        const processTypeSelect = document.getElementById('processType');
        const paramPanel = document.getElementById('paramPanel');
        const paramGroups = document.querySelectorAll('.param-group');

        function updateParams() {
            const selectedType = processTypeSelect.value;
            let hasVisibleParams = false;

            // 遍歷所有參數群組，檢查其 data-types 是否包含目前選擇的演算法
            paramGroups.forEach(group => {
                const types = group.getAttribute('data-types').split(',');
                if (types.includes(selectedType)) {
                    group.style.display = 'block';
                    hasVisibleParams = true;
                } else {
                    group.style.display = 'none';
                }
            });

            // 若有任何參數需顯示，則展開整個參數面板
            paramPanel.style.display = hasVisibleParams ? 'block' : 'none';
        }

        // 綁定下拉選單事件，並在頁面載入時初始化一次
        processTypeSelect.addEventListener('change', updateParams);
        updateParams(); 

        // -----------------------------------------
        // 2. 本端圖片預覽邏輯 (上傳即時顯示)
        // -----------------------------------------
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 顯示原圖預覽
                    document.getElementById('originalImage').src = e.target.result;
                    
                    // 清空之前的處理結果與圖表
                    document.getElementById('processedImage').src = "";
                    document.getElementById('originalHistogram').src = "";
                    document.getElementById('processedHistogram').src = "";
                    document.getElementById('originalSpectrum').src = ""; 
                    document.getElementById('processedSpectrum').src = ""; 
                    
                    // 僅顯示空間域網格，隱藏分析圖表直到處理完成
                    document.getElementById('imageGrid').style.display = 'grid';
                    document.getElementById('histogramSection').style.display = 'none';
                    document.getElementById('spectrumSection').style.display = 'none'; 
                }
                reader.readAsDataURL(file);
            }
        });

        // -----------------------------------------
        // 3. 表單送出與 API 溝通邏輯
        // -----------------------------------------
        document.getElementById('processForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // 阻止表單預設的網頁跳轉行為
            
            const form = e.target;
            const formData = new FormData(form);
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loadingIndicator');

            // 鎖定按鈕並顯示載入動畫
            submitBtn.classList.add('disabled');
            submitBtn.disabled = true;
            submitBtn.innerText = "處理中 (PROCESSING...)";
            loading.style.display = 'block';

            try {
                // 發送 POST 請求至後端 Flask 伺服器
                const response = await fetch('/tool/image-processing', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "伺服器錯誤");

                // 接收 Base64 資料並渲染至對應的 <img> 標籤
                document.getElementById('processedImage').src = "data:image/jpeg;base64," + data.processed_image;
                document.getElementById('originalHistogram').src = "data:image/png;base64," + data.original_histogram;
                document.getElementById('processedHistogram').src = "data:image/png;base64," + data.processed_histogram;
                document.getElementById('originalSpectrum').src = "data:image/jpeg;base64," + data.original_spectrum;
                document.getElementById('processedSpectrum').src = "data:image/jpeg;base64," + data.processed_spectrum;
                
                // 展開所有分析圖表區塊
                document.getElementById('histogramSection').style.display = 'block';
                document.getElementById('spectrumSection').style.display = 'block'; 

                // 平滑滾動至面板底部，讓使用者直接看到結果
                setTimeout(() => {
                    document.querySelector('.tool-panel').scrollTo({
                        top: document.querySelector('.tool-panel').scrollHeight,
                        behavior: 'smooth'
                    });
                }, 100);

            } catch (error) {
                alert('處理失敗：' + error.message);
            } finally {
                // 恢復按鈕狀態與隱藏載入動畫
                submitBtn.classList.remove('disabled');
                submitBtn.disabled = false;
                submitBtn.innerText = "啟動處理程序 (EXECUTE)";
                loading.style.display = 'none';
            }
        });
    </script>

</body>
</html>
