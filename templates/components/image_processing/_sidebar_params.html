<!-- 動態參數設定面板 -->
<div class="param-panel" id="paramPanel">
    <div class="param-header">
        <h4>[ 參數設定 PARAMETERS ]</h4>
        <button type="button" id="resetParamsBtn" class="btn-reset">↺ 重置 (RESET)</button>
    </div>
    
    <!-- 線性轉換 (亮度與對比度) -->
    <div class="param-group" data-types="linear">
        <label>對比度 Alpha (Contrast): <span id="val_alpha">1.0</span></label>
        <input type="range" name="alpha" min="0.1" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('val_alpha').innerText=this.value">
    </div>
    <div class="param-group" data-types="linear">
        <label>亮度 Beta (Brightness): <span id="val_beta">0</span></label>
        <input type="range" name="beta" min="-100" max="100" step="1" value="0" oninput="document.getElementById('val_beta').innerText=this.value">
    </div>

    <!-- 二值化門檻 -->
    <div class="param-group" data-types="binarize">
        <label style="display: flex; justify-content: space-between; align-items: center;">
            <span>門檻值 (Threshold): <span id="val_threshold">127</span></span>
            <label style="font-size: 0.8rem; color: #64ffda; cursor: pointer;">
                <input type="checkbox" name="use_otsu" value="true" id="otsuCheckbox"> Otsu 自動計算
            </label>
        </label>
        <input type="range" name="threshold" id="thresholdSlider" min="0" max="255" value="127" oninput="document.getElementById('val_threshold').innerText=this.value">
    </div>
    <div class="param-group" data-types="binarize">
        <label>二值化模式 (Type):</label>
        <select name="thresh_type" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="binary">標準 (Binary)</option>
            <option value="binary_inv">反轉 (Binary Inv)</option>
            <option value="trunc">截斷 (Truncate)</option>
            <option value="tozero">低於門檻歸零 (To Zero)</option>
            <option value="tozero_inv">高於門檻歸零 (To Zero Inv)</option>
        </select>
    </div>

    <!-- 對數/指數常數 -->
    <div class="param-group" data-types="log,power_law">
        <label>常數 C (Constant): <span id="val_c">1.0</span></label>
        <input type="range" name="c" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_c').innerText=this.value">
    </div>

    <!-- Gamma 值 -->
    <div class="param-group" data-types="power_law">
        <label>Gamma (γ): <span id="val_gamma">1.0</span></label>
        <input type="range" name="gamma" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_gamma').innerText=this.value">
    </div>

    <!-- CLAHE 參數 -->
    <div class="param-group" data-types="clahe">
        <label>對比限制 (Clip Limit): <span id="val_clip">2.0</span></label>
        <input type="range" name="clip_limit" min="1.0" max="10.0" step="0.1" value="2.0" oninput="document.getElementById('val_clip').innerText=this.value">
    </div>
    <div class="param-group" data-types="clahe">
        <label>網格大小 (Tile Grid Size): <span id="val_tile">8</span></label>
        <input type="range" name="tile_grid_size" min="2" max="16" step="2" value="8" oninput="document.getElementById('val_tile').innerText=this.value">
    </div>

    <!-- 動態門檻化 (Moving Average) -->
    <div class="param-group" data-types="moving_average">
        <label>移動視窗大小 (N): <span id="val_ma_n">20</span></label>
        <input type="range" name="ma_n" min="5" max="100" step="1" value="20" oninput="document.getElementById('val_ma_n').innerText=this.value">
    </div>
    <div class="param-group" data-types="moving_average">
        <label>乘數常數 (k): <span id="val_ma_k">0.5</span></label>
        <input type="range" name="ma_k" min="0.1" max="2.0" step="0.1" value="0.5" oninput="document.getElementById('val_ma_k').innerText=this.value">
    </div>

    <!-- 卷積核與標準差 -->
    <div class="param-group" data-types="mean,gaussian,median,log_edge,sobel,laplacian">
        <label>卷積核大小 (Kernel Size): <span id="val_kernel">3</span></label>
        <input type="range" name="kernel_size" min="3" max="15" step="2" value="3" oninput="document.getElementById('val_kernel').innerText=this.value">
    </div>
    <div class="param-group" data-types="gaussian,log_edge">
        <label>標準差 (Sigma): <span id="val_sigma">1.0</span></label>
        <input type="range" name="sigma" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_sigma').innerText=this.value">
    </div>

    <!-- 雙邊濾波參數 -->
    <div class="param-group" data-types="bilateral">
        <label>鄰域直徑 (d): <span id="val_bi_d">9</span></label>
        <input type="range" name="bilateral_d" min="3" max="25" step="2" value="9" oninput="document.getElementById('val_bi_d').innerText=this.value">
    </div>
    <div class="param-group" data-types="bilateral">
        <label>色彩標準差 (Sigma Color): <span id="val_bi_sc">75.0</span></label>
        <input type="range" name="bilateral_sigma_color" min="10" max="150" step="5" value="75.0" oninput="document.getElementById('val_bi_sc').innerText=this.value">
    </div>
    <div class="param-group" data-types="bilateral">
        <label>空間標準差 (Sigma Space): <span id="val_bi_ss">75.0</span></label>
        <input type="range" name="bilateral_sigma_space" min="10" max="150" step="5" value="75.0" oninput="document.getElementById('val_bi_ss').innerText=this.value">
    </div>

    <!-- 銳化參數 -->
    <div class="param-group" data-types="sharpen">
        <label>銳化強度 (Amount): <span id="val_sharp">1.0</span></label>
        <input type="range" name="sharpen_amount" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_sharp').innerText=this.value">
    </div>

    <!-- 邊緣偵測方向 -->
    <div class="param-group" data-types="sobel,prewitt,roberts">
        <label>偵測方向 (Direction):</label>
        <select name="edge_direction" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="both">綜合邊緣 (Magnitude)</option>
            <option value="x">垂直邊緣 (X 軸)</option>
            <option value="y">水平邊緣 (Y 軸)</option>
        </select>
    </div>

    <!-- Canny 邊緣偵測雙門檻與模糊參數 -->
    <div class="param-group" data-types="canny,canny_custom">
        <label>低門檻值 (Threshold 1): <span id="val_th1">50</span></label>
        <input type="range" name="threshold1" min="0" max="255" value="50" oninput="document.getElementById('val_th1').innerText=this.value">
    </div>
    <div class="param-group" data-types="canny,canny_custom">
        <label>高門檻值 (Threshold 2): <span id="val_th2">150</span></label>
        <input type="range" name="threshold2" min="0" max="255" value="150" oninput="document.getElementById('val_th2').innerText=this.value">
    </div>
    <div class="param-group" data-types="canny,canny_custom">
        <label>高斯模糊核大小 (Blur Kernel): <span id="val_canny_k">5</span></label>
        <input type="range" name="canny_blur_ksize" min="3" max="15" step="2" value="5" oninput="document.getElementById('val_canny_k').innerText=this.value">
    </div>
    <div class="param-group" data-types="canny,canny_custom">
        <label>高斯模糊標準差 (Blur Sigma): <span id="val_canny_sig">1.4</span></label>
        <input type="range" name="canny_blur_sigma" min="0.1" max="5.0" step="0.1" value="1.4" oninput="document.getElementById('val_canny_sig').innerText=this.value">
    </div>

    <!-- 頻率域濾波參數 -->
    <div class="param-group" data-types="freq_ideal_low,freq_ideal_high,freq_butterworth_low,freq_gaussian_low,freq_butterworth_high,freq_gaussian_high,freq_butterworth_bandreject,freq_butterworth_bandpass,freq_butterworth_emphasis">
        <label>截斷/阻帶頻率半徑 (D0): <span id="val_d0">30</span></label>
        <input type="range" name="D0" min="5" max="200" step="5" value="30" oninput="document.getElementById('val_d0').innerText=this.value">
    </div>
    <div class="param-group" data-types="freq_butterworth_low,freq_butterworth_high,freq_butterworth_bandreject,freq_butterworth_bandpass,freq_butterworth_emphasis,notch_reject">
        <label>階數 (n): <span id="val_n">2</span></label>
        <input type="range" name="n" min="1" max="5" step="1" value="2" oninput="document.getElementById('val_n').innerText=this.value">
    </div>

    <!-- 帶通/帶阻 專用 -->
    <div class="param-group" data-types="freq_butterworth_bandreject,freq_butterworth_bandpass">
        <label>頻帶寬度 (W): <span id="val_freq_w">10</span></label>
        <input type="range" name="freq_W" min="1" max="100" step="1" value="10" oninput="document.getElementById('val_freq_w').innerText=this.value">
    </div>

    <!-- 高頻強調 專用 -->
    <div class="param-group" data-types="freq_butterworth_emphasis">
        <label>常數偏移量 (a): <span id="val_freq_a">0.5</span></label>
        <input type="range" name="freq_a" min="0.0" max="2.0" step="0.1" value="0.5" oninput="document.getElementById('val_freq_a').innerText=this.value">
    </div>
    <div class="param-group" data-types="freq_butterworth_emphasis">
        <label>高頻乘數 (b): <span id="val_freq_b">1.5</span></label>
        <input type="range" name="freq_b" min="0.5" max="3.0" step="0.1" value="1.5" oninput="document.getElementById('val_freq_b').innerText=this.value">
    </div>

    <!-- Notch Filter 專用 -->
    <div class="param-group" data-types="notch_reject">
        <label>濾波模式 (Type):</label>
        <select name="notch_type" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="reject">帶阻 (消除雜訊)</option>
            <option value="pass">帶通 (提取雜訊)</option>
        </select>
    </div>
    <div class="param-group" data-types="notch_reject">
        <label>水平阻帶半徑 (Width): <span id="val_notch_u">30</span></label>
        <input type="range" name="notch_d0_u" min="1" max="200" step="1" value="30" oninput="document.getElementById('val_notch_u').innerText=this.value">
    </div>
    <div class="param-group" data-types="notch_reject">
        <label>垂直阻帶半徑 (Height): <span id="val_notch_v">30</span></label>
        <input type="range" name="notch_d0_v" min="1" max="200" step="1" value="30" oninput="document.getElementById('val_notch_v').innerText=this.value">
    </div>
    <div class="param-group" data-types="notch_reject">
        <label>垂直頻率中心 (u0): <span id="val_u0">50</span></label>
        <input type="range" name="u0" min="-200" max="200" step="1" value="50" oninput="document.getElementById('val_u0').innerText=this.value">
    </div>
    <div class="param-group" data-types="notch_reject">
        <label>水平頻率中心 (v0): <span id="val_v0">50</span></label>
        <input type="range" name="v0" min="-200" max="200" step="1" value="50" oninput="document.getElementById('val_v0').innerText=this.value">
    </div>

    <!-- Hough Lines 共用參數 -->
    <div class="param-group" data-types="hough_lines_standard,hough_lines_p">
        <label>線檢測靈敏度 (Threshold): <span id="val_hough_th">100</span></label>
        <input type="range" name="hough_threshold" min="10" max="300" step="5" value="100" oninput="document.getElementById('val_hough_th').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_lines_standard,hough_lines_p">
        <label>距離解析度 Rho: <span id="val_hough_rho">1.0</span></label>
        <input type="range" name="hough_rho" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_hough_rho').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_lines_standard,hough_lines_p">
        <label>角度解析度 Theta (度): <span id="val_hough_theta">1.0</span></label>
        <input type="range" name="hough_theta" min="0.1" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_hough_theta').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_lines_standard,hough_lines_p">
        <label>底層 Canny 低門檻: <span id="val_hl_th1">50</span></label>
        <input type="range" name="hough_canny_th1" min="0" max="255" value="50" oninput="document.getElementById('val_hl_th1').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_lines_standard,hough_lines_p">
        <label>底層 Canny 高門檻: <span id="val_hl_th2">150</span></label>
        <input type="range" name="hough_canny_th2" min="0" max="255" value="150" oninput="document.getElementById('val_hl_th2').innerText=this.value">
    </div>

    <!-- 機率霍夫線 (Hough Lines P) 專用 -->
    <div class="param-group" data-types="hough_lines_p">
        <label>最小線段長度 (Min Length): <span id="val_hough_min_l">50</span></label>
        <input type="range" name="hough_min_line_length" min="1" max="200" step="1" value="50" oninput="document.getElementById('val_hough_min_l').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_lines_p">
        <label>最大斷裂容忍 (Max Gap): <span id="val_hough_max_g">10</span></label>
        <input type="range" name="hough_max_line_gap" min="1" max="100" step="1" value="10" oninput="document.getElementById('val_hough_max_g').innerText=this.value">
    </div>

    <!-- Hough Circles 專用 -->
    <div class="param-group" data-types="hough_circles">
        <label>累加器解析度比例 (dp): <span id="val_hough_dp">1.0</span></label>
        <input type="range" name="hough_dp" min="1.0" max="5.0" step="0.1" value="1.0" oninput="document.getElementById('val_hough_dp').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_circles">
        <label>最小圓心距離 (Min Dist): <span id="val_hough_dist">20</span></label>
        <input type="range" name="hough_min_dist" min="10" max="200" step="5" value="20" oninput="document.getElementById('val_hough_dist').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_circles">
        <label>邊緣檢測高門檻 (Param1): <span id="val_hc_p1">50</span></label>
        <input type="range" name="hough_param1" min="10" max="255" step="1" value="50" oninput="document.getElementById('val_hc_p1').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_circles,hough_lines_standard,hough_lines_p">
        <label>前處理模糊核大小 (Blur Kernel): <span id="val_hc_k">5</span></label>
        <input type="range" name="hough_blur_ksize" min="1" max="15" step="2" value="5" oninput="document.getElementById('val_hc_k').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_circles">
        <label>圓檢測靈敏度 (Param2): <span id="val_hough_p2">30</span></label>
        <input type="range" name="hough_param2" min="10" max="100" step="2" value="30" oninput="document.getElementById('val_hough_p2').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_circles">
        <label>最小半徑 (Min Radius): <span id="val_hough_min_r">0</span></label>
        <input type="range" name="hough_min_radius" min="0" max="100" step="5" value="0" oninput="document.getElementById('val_hough_min_r').innerText=this.value">
    </div>
    <div class="param-group" data-types="hough_circles">
        <label>最大半徑 (Max Radius): <span id="val_hough_max_r">0</span></label>
        <input type="range" name="hough_max_radius" min="0" max="300" step="10" value="0" oninput="document.getElementById('val_hough_max_r').innerText=this.value">
    </div>

    <!-- ========================================== -->
    <!-- 🌟 自適應門檻化參數 -->
    <!-- ========================================== -->
    <div class="param-group" data-types="adaptive_threshold">
        <label>計算方法 (Method):</label>
        <select name="adaptive_method" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="gaussian">高斯加權 (Gaussian)</option>
            <option value="mean">鄰域平均 (Mean)</option>
        </select>
    </div>
    <div class="param-group" data-types="adaptive_threshold">
        <label>區塊大小 (Block Size): <span id="val_adapt_block">11</span></label>
        <input type="range" name="block_size" min="3" max="51" step="2" value="11" oninput="document.getElementById('val_adapt_block').innerText=this.value">
    </div>
    <div class="param-group" data-types="adaptive_threshold">
        <label>常數偏移量 (C): <span id="val_adapt_c">2</span></label>
        <input type="range" name="C" min="-10" max="20" step="1" value="2" oninput="document.getElementById('val_adapt_c').innerText=this.value">
    </div>

    <!-- ========================================== -->
    <!-- 🌟 形態學運算參數 -->
    <!-- ========================================== -->
    <div class="param-group" data-types="erosion,dilation,opening,closing,tophat,blackhat,morph_gradient,boundary_extraction,morph_smoothing">
        <label>結構元素形狀 (Shape):</label>
        <select name="shape" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="rect">方形 (Rectangle)</option>
            <option value="ellipse">圓形 (Ellipse)</option>
            <option value="cross">十字 (Cross)</option>
        </select>
    </div>
    <div class="param-group" data-types="erosion,dilation,opening,closing,tophat,blackhat,morph_gradient,boundary_extraction,morph_smoothing">
        <label>核大小 (Kernel Size): <span id="val_morph_k">3</span></label>
        <input type="range" name="ksize" min="3" max="31" step="2" value="3" oninput="document.getElementById('val_morph_k').innerText=this.value">
    </div>
    
    <!-- 執行次數 (僅適用於基礎形態學) -->
    <div class="param-group" data-types="erosion,dilation,opening,closing">
        <label>執行次數 (Iterations): <span id="val_morph_iter">1</span></label>
        <input type="range" name="iterations" min="1" max="10" step="1" value="1" oninput="document.getElementById('val_morph_iter').innerText=this.value">
    </div>

    <!-- 複合平滑專屬 -->
    <div class="param-group" data-types="morph_smoothing">
        <label>複合模式 (Mode):</label>
        <select name="smooth_mode" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="open_close">先斷開後閉合 (Open-Close)</option>
            <option value="close_open">先閉合後斷開 (Close-Open)</option>
        </select>
    </div>

    <!-- ========================================== -->
    <!-- 🌟 進階分析與分割參數 -->
    <!-- ========================================== -->
    
    <!-- 連通區域分析 (Connected Components) -->
    <div class="param-group" data-types="connected_components">
        <label>連通性定義 (Connectivity):</label>
        <select name="connectivity" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #1e2d3d; border-radius: 4px;">
            <option value="8">8-連通 (8-Neighbor)</option>
            <option value="4">4-連通 (4-Neighbor)</option>
        </select>
    </div>
    <div class="param-group" data-types="connected_components">
        <label>最小面積 (Min Area): <span id="val_min_area">100</span></label>
        <input type="range" name="min_area" min="0" max="5000" step="10" value="100" oninput="document.getElementById('val_min_area').innerText=this.value">
    </div>
    <div class="param-group" data-types="connected_components">
        <label>最大面積 (Max Area): <span id="val_max_area">999999</span></label>
        <input type="range" name="max_area" min="1000" max="999999" step="1000" value="999999" oninput="document.getElementById('val_max_area').innerText=this.value">
    </div>

    <!-- 進階幾何與灰階特徵 (Advanced Features) -->
    <div class="param-group" data-types="advanced_features">
        <label>最小面積過濾 (Min Area): <span id="val_adv_min_area">100</span></label>
        <input type="range" name="adv_min_area" min="0" max="5000" step="10" value="100" oninput="document.getElementById('val_adv_min_area').innerText=this.value">
    </div>
    <div class="param-group" data-types="advanced_features">
        <label style="display: flex; flex-direction: column; gap: 8px;">
            <label><input type="checkbox" name="draw_bounding_rect" value="true" checked> 繪製正交包圍盒 (綠)</label>
            <label><input type="checkbox" name="draw_min_rect" value="true" checked> 繪製最小旋轉盒 (藍)</label>
            <label><input type="checkbox" name="draw_circle" value="true"> 繪製最小包圍圓 (黃)</label>
            <label><input type="checkbox" name="draw_ellipse" value="true" checked> 繪製橢圓擬合 (橘)</label>
            <label><input type="checkbox" name="draw_hull" value="true"> 繪製凸包邊界 (紫)</label>
            <label><input type="checkbox" name="calc_gray" value="true" checked> 計算區域灰階 (Mean/Std)</label>
            <label><input type="checkbox" name="calc_perimeter" value="true" checked> 計算輪廓周長 (Perimeter)</label>
            <label><input type="checkbox" name="calc_shape" value="true" checked> 計算圓度與長短軸比 (C / AR)</label>
        </label>
    </div>

    <!-- 次像素角點偵測 (Subpixel Corners) -->
    <div class="param-group" data-types="subpixel_corners">
        <label>最大角點數量 (Max Corners): <span id="val_max_corners">100</span></label>
        <input type="range" name="max_corners" min="10" max="500" step="10" value="100" oninput="document.getElementById('val_max_corners').innerText=this.value">
    </div>
    <div class="param-group" data-types="subpixel_corners">
        <label>品質門檻 (Quality): <span id="val_quality">0.01</span></label>
        <input type="range" name="quality" min="0.01" max="0.5" step="0.01" value="0.01" oninput="document.getElementById('val_quality').innerText=this.value">
    </div>
    <div class="param-group" data-types="subpixel_corners">
        <label>最小距離 (Min Distance): <span id="val_min_dist">10</span></label>
        <input type="range" name="min_dist" min="1" max="100" step="1" value="10" oninput="document.getElementById('val_min_dist').innerText=this.value">
    </div>

    <!-- 次像素輪廓 (Subpixel Contours) -->
    <div class="param-group" data-types="subpixel_contours">
        <label>二值化門檻 (Threshold): <span id="val_sub_th">127</span></label>
        <input type="range" name="sub_threshold" min="0" max="255" step="1" value="127" oninput="document.getElementById('val_sub_th').innerText=this.value">
    </div>
    <div class="param-group" data-types="subpixel_contours">
        <label>雙線性內插放大倍率: <span id="val_upscale">4</span></label>
        <input type="range" name="upscale_factor" min="2" max="16" step="2" value="4" oninput="document.getElementById('val_upscale').innerText=this.value">
    </div>

    <!-- 區域分裂與合併 (Quadtree) -->
    <div class="param-group" data-types="region_split_merge">
        <label>分裂標準差門檻 (Std TH): <span id="val_std_th">15.0</span></label>
        <input type="range" name="std_threshold" min="1.0" max="50.0" step="1.0" value="15.0" oninput="document.getElementById('val_std_th').innerText=this.value">
    </div>
    <div class="param-group" data-types="region_split_merge">
        <label>最小區塊限制 (Min Size): <span id="val_min_size">8</span></label>
        <input type="range" name="min_size" min="4" max="64" step="2" value="8" oninput="document.getElementById('val_min_size').innerText=this.value">
    </div>

    <!-- 模糊次像素測量 (FMV) -->
    <div class="param-group" data-types="fuzzy_measurement">
        <label>模糊下限 (Min Value): <span id="val_fmv_min">40</span></label>
        <input type="range" name="fmv_min" min="0" max="255" step="1" value="40" oninput="document.getElementById('val_fmv_min').innerText=this.value">
    </div>
    <div class="param-group" data-types="fuzzy_measurement">
        <label>模糊上限 (Max Value): <span id="val_fmv_max">120</span></label>
        <input type="range" name="fmv_max" min="0" max="255" step="1" value="120" oninput="document.getElementById('val_fmv_max').innerText=this.value">
    </div>

    <!-- 區域成長 (Region Growing) -->
    <div class="param-group" data-types="region_growing">
        <label>色彩容差 (Tolerance): <span id="val_tolerance">20</span></label>
        <input type="range" name="tolerance" min="1" max="100" step="1" value="20" oninput="document.getElementById('val_tolerance').innerText=this.value">
    </div>
    <div class="param-group" data-types="region_growing">
        <label>種子點 X 座標 (0為自動置中): <span id="val_seed_x">0</span></label>
        <input type="range" name="seed_x" min="0" max="2000" step="1" value="0" oninput="document.getElementById('val_seed_x').innerText=this.value">
    </div>
    <div class="param-group" data-types="region_growing">
        <label>種子點 Y 座標 (0為自動置中): <span id="val_seed_y">0</span></label>
        <input type="range" name="seed_y" min="0" max="2000" step="1" value="0" oninput="document.getElementById('val_seed_y').innerText=this.value">
    </div>
</div>
