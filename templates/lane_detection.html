<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車道線偵測 | AVITA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='layout.css') }}">
    <style>
        /* 繼承 layout.css 的架構，並補上影片專用的網格樣式 */
        .comparison-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%;
        }
        .video-box { 
            text-align: center; 
            background: rgba(0, 0, 0, 0.5); 
            padding: 15px; border-radius: 8px; border: 1px dashed rgba(100, 255, 218, 0.2); 
            min-height: 300px; display: flex; flex-direction: column; justify-content: center;
        }
        .video-box h4 { 
            color: #64ffda; font-family: 'Orbitron', sans-serif; margin: 0 0 15px 0; font-size: 0.9rem; letter-spacing: 1px; 
        }
        video { 
            max-width: 100%; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); display: none; background: #000; width: 100%;
        }
        .loading-text { 
            color: #ff79c6; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: bold; text-align: center; line-height: 1.5;
        }
        
        /* 手機版單欄顯示 */
        @media (max-width: 768px) {
            .tool-layout { flex-direction: column; }
            .sidebar { flex: none; width: 100%; max-height: none; }
            .comparison-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container" style="display: flex; flex-direction: column; align-items: center; padding-top: 30px;">
        
        <!-- 🌟 套用標準的 tool-panel 框架 -->
        <div class="tool-panel wide">
            
            <!-- 頂部標題列 -->
            <div class="panel-header">
                <a href="/" class="btn btn-back">← 回到大廳</a>
                <h2>🚗 Lane Detection | 車道線追蹤系統</h2>
                <div class="header-spacer"></div>
            </div>

            <!-- 左右佈局 -->
            <div class="tool-layout">
                
                <!-- 左側：控制面板 (Sidebar) -->
                <div class="sidebar">
                    <form id="videoForm">
                        <div class="form-group">
                            <label>選擇行車紀錄器影片 (MP4)：</label>
                            <input type="file" name="video" id="videoInput" accept="video/mp4,video/x-m4v,video/*" required>
                        </div>
                        <button type="submit" id="submitBtn" class="btn submit-btn" style="background: rgba(100, 255, 218, 0.1); border-color: #64ffda; color: #64ffda;">開始 AI 運算</button>
                        <p id="loadingText" class="loading-text">⏳ 影片逐幀處理中<br>這可能需要幾分鐘的時間<br>請勿關閉網頁...</p>
                    </form>
                </div>

                <!-- 右側：主內容預覽區 (Main Content) -->
                <div class="main-content">
                    <div class="comparison-grid" id="previewContainer">
                        <!-- 原始影片 -->
                        <div class="video-box">
                            <h4>🎬 原始影片預覽</h4>
                            <video id="inputPreview" controls></video>
                        </div>
                        
                        <!-- 偵測結果 -->
                        <div class="video-box">
                            <h4>✨ 偵測結果</h4>
                            <video id="outputPreview" controls></video>
                            <a id="downloadBtn" class="btn submit-btn" style="display: none; margin-top: 15px; background: rgba(255, 121, 198, 0.1); border-color: #ff79c6; color: #ff79c6; text-decoration: none;">⬇️ 下載分析結果</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const inputPreview = document.getElementById('inputPreview');
        const videoForm = document.getElementById('videoForm');
        const submitBtn = document.getElementById('submitBtn');
        const outputPreview = document.getElementById('outputPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        const loadingText = document.getElementById('loadingText');

        // 選擇影片時預覽
        videoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                inputPreview.src = url;
                inputPreview.style.display = 'block';
                outputPreview.style.display = 'none';
                downloadBtn.style.display = 'none';
            }
        });

        // 表單提交
        videoForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // UI 狀態切換
            submitBtn.disabled = true;
            submitBtn.textContent = '處理中...';
            submitBtn.style.opacity = '0.5';
            loadingText.style.display = 'block';
            outputPreview.style.display = 'none';
            downloadBtn.style.display = 'none';

            const formData = new FormData(this);

            // 🌟 1. 網址改為與 lane.py 一致的 '/tool/lane-detection'
            fetch('/tool/lane-detection', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('伺服器處理失敗');
                }
                // 🌟 2. 告訴前端：後端傳來的是「二進制檔案 (Blob)」，不是 JSON
                return response.blob();
            })
            .then(blob => {
                // 🌟 3. 將接收到的影片 Blob 轉換為瀏覽器可播放的暫時 URL
                const videoUrl = URL.createObjectURL(blob);
                
                outputPreview.src = videoUrl;
                outputPreview.style.display = 'block';
                
                downloadBtn.href = videoUrl;
                // 設定下載時的預設檔名
                downloadBtn.download = 'lane_detection_result.mp4'; 
                downloadBtn.style.display = 'block';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('發生錯誤，請檢查網路連線或影片格式。');
            })
            .finally(() => {
                // 恢復 UI 狀態
                submitBtn.disabled = false;
                submitBtn.textContent = '開始 AI 運算';
                submitBtn.style.opacity = '1';
                loadingText.style.display = 'none';
            });
        });
    </script>
</body>
</html>
